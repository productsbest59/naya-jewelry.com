<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Naya Fine Jewelry</title>
  <meta name="description" content="Naya Fine Jewelry" />
  <style>
    :root{
      --gold1:#f2b21b;
      --gold2:#c88400;
      --text:#ffffff;
      --bg-top:#2d2d2d;
      --bg-bottom:#0a0a0a;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 15% 42%, rgba(212,160,23,.28), transparent 18%),
        radial-gradient(circle at 85% 40%, rgba(212,160,23,.18), transparent 16%),
        linear-gradient(180deg, var(--bg-top) 0%, #151515 34%, var(--bg-bottom) 58%, #000 100%);
      text-align:center;
      overflow-x:hidden;
    }

    .page{
      width:100%;
      max-width:980px;
      margin:0 auto;
      padding-bottom:40px;
    }

    .header-wrap{
      width:100%;
      background:#111;
      overflow:hidden;
    }

    .header-image{
      display:block;
      width:100%;
      height:220px;
      object-fit:contain;
      background:#111;
    }

    .logo-wrap{
      width:190px;
      height:190px;
      margin:-36px auto 22px;
      border-radius:50%;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      background: radial-gradient(circle at 50% 30%, #313545, #171922 75%);
      box-shadow:
        0 0 28px rgba(255,191,0,0.18),
        0 18px 40px rgba(0,0,0,0.55);
      position:relative;
      z-index:2;
    }

    .logo-wrap img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      border-radius:50%;
    }

    .buttons{
      display:flex;
      justify-content:center;
      gap:18px;
      margin:8px auto 26px;
      padding:0 16px;
      flex-wrap:wrap;
    }

    .btn{
      min-width:220px;
      padding:16px 28px;
      border-radius:999px;
      text-decoration:none;
      font-size:1.15rem;
      font-weight:700;
      color:#261700;
      background:linear-gradient(180deg, var(--gold1), var(--gold2));
      box-shadow:
        0 0 18px rgba(255,170,0,.35),
        inset 0 0 0 2px rgba(255,245,210,.5);
      transition:transform .18s ease, box-shadow .18s ease;
    }

    .btn:hover{
      transform:translateY(-2px);
      box-shadow:
        0 0 24px rgba(255,170,0,.5),
        inset 0 0 0 2px rgba(255,245,210,.6);
    }

    .gallery{
      margin:26px auto 0;
      padding:0 16px;
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:18px;
    }

    .placeholder{
      min-height:220px;
      border:2px dashed rgba(255,255,255,.22);
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#d7d7d7;
      background:rgba(255,255,255,.02);
      padding:16px;
    }

    @media (max-width: 700px){
      .logo-wrap{
        width:160px;
        height:160px;
        margin:-28px auto 20px;
      }

      .btn{
        min-width:170px;
        font-size:1rem;
        padding:14px 18px;
      }

      .gallery{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">

    <div class="header-wrap">
      <img
        src="https://cdn.jsdelivr.net/gh/productsbest59/naya-jewelry.com/header.png"
        alt="Naya Fine Jewelry"
        class="header-image"
      >
    </div>

    <div class="logo-wrap">
      <img
        src="https://cdn.jsdelivr.net/gh/productsbest59/naya-jewelry.com/logo.png"
        alt="Naya Logo"
      >
    </div>

    <div class="buttons">
      <a class="btn" href="https://twik.co.il/a/Naya/" target="_blank" rel="noopener noreferrer">
        לאתר שלנו
      </a>

      <a class="btn" href="https://twik.co.il/store/Naya/" target="_blank" rel="noopener noreferrer">
        לחנות שלנו
      </a>
    </div>

    <section class="gallery">
      <div class="placeholder">כאן תוסיף תמונת תכשיט</div>
      <div class="placeholder">כאן תוסיף תמונת תכשיט</div>
      <div class="placeholder">כאן תוסיף תמונת תכשיט</div>
    </section>

  </main>
</body>
</html>
