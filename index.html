<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naya Jewelry</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial;
  text-align:center;
  color:white;
  background:linear-gradient(#2b2b2b,#000);
}

/* ===== HEADER ===== */

/* מובייל */
.header{
  width:100%;
  height:260px;
  background:url("https://cdn.jsdelivr.net/gh/productsbest59/naya-jewelry.com/header.png") center/cover no-repeat;
}

/* דסקטופ - תמונה אחרת */
@media(min-width:900px){
  .header{
    height:300px;
    background:url("https://cdn.jsdelivr.net/gh/productsbest59/naya-jewelry.com/header-desktop.png") center/contain no-repeat;
    background-color:#111;
  }
}

/* ===== LOGO ===== */
.logo{
  width:100px;
  margin-top:-40px;
  filter:drop-shadow(0 10px 20px rgba(0,0,0,0.6));
}

/* ===== BUTTONS ===== */
.buttons{
  display:flex;
  justify-content:center;
  gap:12px;
  margin:20px;
}

.btn{
  flex:1;
  max-width:180px;
  padding:12px;
  border-radius:999px;
  background:linear-gradient(#f2b21b,#c88400);
  color:#2b1800;
  text-decoration:none;
  font-weight:bold;
  box-shadow:0 0 15px rgba(255,170,0,0.4);
}

/* ===== GALLERY ===== */
.gallery{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  padding:15px;
}

.box{
  height:180px;
  border:2px dashed rgba(255,255,255,0.3);
  border-radius:15px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#ccc;
}

/* מובייל */
@media(max-width:700px){
  .gallery{
    grid-template-columns:1fr;
  }
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header"></div>

<!-- LOGO -->
<img src="https://cdn.jsdelivr.net/gh/productsbest59/naya-jewelry.com/logo.png" class="logo">

<!-- BUTTONS -->
<div class="buttons">
  <a class="btn" href="#">לאתר שלנו</a>
  <a class="btn" href="#">לחנות שלנו</a>
</div>

<!-- GALLERY -->
<div class="gallery">
  <div class="box">כאן תבוא תמונה</div>
  <div class="box">כאן תבוא תמונה</div>
  <div class="box">כאן תבוא תמונה</div>
</div>

</body>
</html>
