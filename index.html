  <script>
    const html=document.documentElement, langToggle=document.getElementById('langToggle'), welcomeImage=document.getElementById('welcomeImage');
function setLang(lang){
  const isHe = lang === 'he';

  html.lang = isHe ? 'he' : 'en';
  html.dir = isHe ? 'rtl' : 'ltr';

  welcomeImage.src =
    window.innerWidth <= 1024
      ? (isHe ? 'nayawelcomehebmobile.jpg' : 'nayawelcomeengmobile.jpg')
      : (isHe ? 'nayawelcomeheb.jpg' : 'nayawelcomeeng.jpg');

  welcomeImage.alt = isHe
    ? 'Naya Fine Jewelry - ברוכים הבאים'
    : 'Naya Fine Jewelry - Welcome';

  langToggle.textContent = isHe ? 'English' : 'עברית';

  document.querySelectorAll('[data-he][data-en]').forEach(el=>{
    el.textContent = isHe
      ? el.getAttribute('data-he')
      : el.getAttribute('data-en');
  });

  document.querySelector('.entry-main').setAttribute(
    'aria-label',
    isHe ? 'כניסה לאתר שלנו' : 'Enter our main site'
  );

  document.querySelector('.entry-mehadrin').setAttribute(
    'aria-label',
    isHe ? 'כניסה לאתר מהדרין' : 'Enter Mehadrin site'
  );
}    langToggle.addEventListener('click',()=>setLang(html.lang==='he'?'en':'he')); setLang('he');
  </script>
  <script>
    const fab=document.getElementById('a11yFab'),panel=document.getElementById('a11yPanel'),backdrop=document.getElementById('a11yBackdrop'),closeBtn=document.getElementById('a11yClose'),resetBtn=document.getElementById('a11yReset'),cards=Array.from(document.querySelectorAll('.a11y-card')),fontValue=document.getElementById('fontValue'),fontPlus=document.getElementById('fontPlus'),fontMinus=document.getElementById('fontMinus');
    const storageKey='naya_entry_a11y_modes_v1',fontStorageKey='naya_entry_font_scale_v1';
    function openPanel(){panel.classList.add('open');backdrop.classList.add('open');fab.setAttribute('aria-expanded','true')} function closePanel(){panel.classList.remove('open');backdrop.classList.remove('open');fab.setAttribute('aria-expanded','false')}
    function getSavedModes(){try{return JSON.parse(localStorage.getItem(storageKey))||[]}catch(e){return[]}} function saveModes(modes){localStorage.setItem(storageKey,JSON.stringify(modes))}
    function getSavedFont(){const saved=parseInt(localStorage.getItem(fontStorageKey)||'100',10);return isNaN(saved)?100:Math.min(140,Math.max(90,saved))} function saveFont(value){localStorage.setItem(fontStorageKey,String(value))}
    function applyFont(){const value=getSavedFont();document.documentElement.style.fontSize=value+'%';fontValue.textContent=value+'%'}
    function applyModes(){const modes=getSavedModes();cards.forEach(card=>{const mode=card.getAttribute('data-mode');const active=modes.includes(mode);document.body.classList.toggle(mode,active);card.classList.toggle('active',active)})}
    fab.addEventListener('click',openPanel);closeBtn.addEventListener('click',closePanel);backdrop.addEventListener('click',closePanel);
    cards.forEach(card=>card.addEventListener('click',()=>{const mode=card.getAttribute('data-mode');let modes=getSavedModes();modes=modes.includes(mode)?modes.filter(item=>item!==mode):modes.concat([mode]);saveModes(modes);applyModes()}));
    fontPlus.addEventListener('click',()=>{const next=Math.min(140,getSavedFont()+10);saveFont(next);applyFont()}); fontMinus.addEventListener('click',()=>{const next=Math.max(90,getSavedFont()-10);saveFont(next);applyFont()});
    resetBtn.addEventListener('click',()=>{localStorage.removeItem(storageKey);localStorage.removeItem(fontStorageKey);document.documentElement.style.fontSize='100%';fontValue.textContent='100%';applyModes()}); document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel()}); applyModes();applyFont();
  </script>
