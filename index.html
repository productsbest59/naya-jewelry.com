<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Naya Fine Jewelry</title>

<style>
:root{
  --gold1:#f2b21b;
  --gold2:#c88400;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial,sans-serif;
  color:#fff;
  text-align:center;
  overflow-x:hidden;
  background:linear-gradient(180deg,#2b2b2b,#000);
}

.container{
  max-width:1320px;
  margin:auto;
  padding-bottom:40px;
}

.header{
  height:240px;
  background:url("https://cdn.jsdelivr.net/gh/productsbest59/naya-jewelry.com/header.png") center/cover no-repeat;
}

/* ===== LOGO ===== */
.logo-row{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  margin-top:-30px;
}

.logo{
  width:190px;
}

/* ===== BUTTONS ===== */
.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:12px;
  border-radius:999px;
  font-weight:700;
  background:linear-gradient(180deg,var(--gold1),var(--gold2));
  color:#2b1800;
  text-decoration:none;
}

/* ===== GALLERY ===== */
.gallery{
  display:grid;
  grid-template-columns:1fr;
  gap:14px;
  padding:0 12px;
}

.gallery-card{
  border-radius:18px;
  overflow:hidden;
}

.gallery-card img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center 85%; /* שומר ווטרמארק */
  aspect-ratio:4/5;
}

/* ===== DESKTOP ===== */
@media (min-width:901px){
  .gallery{
    grid-template-columns:repeat(3,1fr);
  }
}

/* ===== MOBILE FIX ===== */
@media (max-width:768px){

  .gallery{
    grid-template-columns:1fr;
  }

  .gallery-card{
    max-width:82%;
    margin:auto;
  }

  .gallery-card img{
    height:auto;
    max-height:70vh;
    object-fit:contain; /* בלי חיתוך */
  }
}

/* ===== SMALL MOBILE ===== */
@media (max-width:480px){
  .gallery-card{
    max-width:78%;
  }
}
</style>
</head>

<body>

<div class="container">

<div class="header"></div>

<div class="logo-row">
  <a class="btn" href="#">לחנות שלנו</a>

  <img src="https://cdn.jsdelivr.net/gh/productsbest59/naya-jewelry.com/logo%20trans.png" class="logo">

  <a class="btn" href="#">לאתר שלנו</a>
</div>

<div class="gallery">
  <div class="gallery-card">
    <img src="model1.jpg">
  </div>

  <div class="gallery-card">
    <img src="model2.jpg">
  </div>

  <div class="gallery-card">
    <img src="model3.jpg">
  </div>
</div>

</div>

</body>
</html>
