<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naya Jewelry</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background: radial-gradient(circle at top, #2a2a2a, #0b0b0b);
  color:white;
  text-align:center;
}

/* HEADER */
.header-image{
  width:100%;
  max-height:220px;
  object-fit:cover;
}

/* LOGO */
.logo-wrap{
  width:180px;
  height:180px;
  margin:-60px auto 20px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#111;

  box-shadow:
    0 0 40px rgba(212,160,23,0.3),
    0 20px 40px rgba(0,0,0,0.8);
}

.logo-wrap img{
  width:80%;
}

/* BUTTONS */
.buttons{
  display:flex;
  justify-content:center;
  gap:15px;
  margin:20px;
  flex-wrap:wrap;
}

.btn{
  background:linear-gradient(135deg,#ffb300,#ff8800);
  color:#000;
  padding:14px 26px;
  border-radius:30px;
  text-decoration:none;
  font-weight:bold;
  box-shadow:0 0 15px rgba(255,170,0,0.6);
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:15px;
  padding:20px;
}

.gallery div{
  border:2px dashed rgba(255,255,255,0.2);
  padding:40px;
  border-radius:15px;
  color:#ccc;
}
</style>
</head>

<body>

<!-- HEADER -->
<img src="https://raw.githubusercontent.com/productsbest59/naya-jewelry.com/main/header.png" class="header-image">

<!-- LOGO -->
<div class="logo-wrap">
  <img src="https://raw.githubusercontent.com/productsbest59/naya-jewelry.com/main/logo.png">
</div>

<!-- BUTTONS -->
<div class="buttons">
  <a class="btn" href="https://twik.co.il/a/Naya/" target="_blank">לאתר שלנו</a>
  <a class="btn" href="https://twik.co.il/store/Naya/" target="_blank">לחנות שלנו</a>
</div>

<!-- GALLERY -->
<div class="gallery">
  <div>כאן תוסיף תמונת תכשיט</div>
  <div>כאן תוסיף תמונת תכשיט</div>
  <div>כאן תוסיף תמונת תכשיט</div>
</div>

</body>
</html>
