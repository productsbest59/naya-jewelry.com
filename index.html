<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naya Fine Jewelry</title>
<style>

body{margin:0;font-family:Arial,sans-serif;background:#0b0b0b;color:#fff}
button{cursor:pointer}
#menuToggle{position:fixed;top:15px;right:15px;font-size:26px;background:#111;color:#fff;border:none;padding:10px 14px;border-radius:10px;z-index:1000}
#langToggle{position:fixed;top:15px;right:72px;background:#111;color:#fff;border:none;padding:12px 14px;border-radius:10px;z-index:1000;font-weight:bold}
#mainMenu{position:fixed;top:0;right:-300px;width:260px;height:100%;background:#111;padding:20px;transition:.25s;z-index:999;box-shadow:-10px 0 30px rgba(0,0,0,.35)}
#mainMenu.open{right:0}
#menuBackdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;z-index:998}
#menuBackdrop.open{display:block}
#mainMenu a{display:block;color:#fff;margin:15px 0;text-decoration:none;font-weight:bold;padding:12px 14px;border-radius:12px;background:rgba(255,255,255,.05)}
#menuClose{background:none;border:none;color:#fff;font-size:28px;display:block;margin-bottom:15px}
footer{padding:22px 16px;text-align:center;color:#ccc;font-size:14px}

.container{max-width:1100px;margin:auto;padding:90px 20px 40px;text-align:center}
.hero{padding:40px 20px}
.hero h1{font-size:42px;margin:0 0 18px}
.hero p{max-width:760px;margin:0 auto 16px;line-height:1.9;font-size:20px;color:#e9e9e9}
.cta{background:gold;color:#000;padding:16px 28px;border-radius:999px;display:inline-block;margin-top:22px;text-decoration:none;font-weight:bold}
.note{margin-top:18px;color:#ddd;font-size:16px}
</style>
</head>
<body data-title-he="Naya Fine Jewelry" data-title-en="Naya Fine Jewelry">
<button id="menuToggle">☰</button>
<button id="langToggle">EN</button>
<div id="menuBackdrop"></div>

<div id="mainMenu">
  <button id="menuClose">✕</button>
  <a href="https://twik.co.il/store/Naya/" data-he="לחנות שלנו" data-en="Our Store">לחנות שלנו</a>
  <a href="blog.html" data-he="לבלוגים" data-en="Blog">לבלוגים</a>
</div>

<div class="container">
  <section class="hero">
    <h1 data-he="ברוכים הבאים ל‑Naya" data-en="Welcome to Naya">ברוכים הבאים ל‑Naya</h1>
    <p data-he="ברוכים הבאים לעולם של משמעות, אמונה וסטייל." data-en="Welcome to a world of meaning, faith and style.">ברוכים הבאים לעולם של משמעות, אמונה וסטייל.</p>
    <p data-he="התכשיטים שלנו משלבים השראה יהודית, עיצוב מוקפד ונוכחות יוקרתית." data-en="Our jewelry combines Jewish inspiration, refined design and a luxurious presence.">התכשיטים שלנו משלבים השראה יהודית, עיצוב מוקפד ונוכחות יוקרתית.</p>
    <p data-he="תכשיטים שלא רק נראים טוב – אלא גם מספרים סיפור." data-en="Jewelry that does not just look beautiful – it tells a story.">תכשיטים שלא רק נראים טוב – אלא גם מספרים סיפור.</p>
    <a class="cta" href="https://twik.co.il/store/Naya/" data-he="לחנות שלנו" data-en="Our Store">לחנות שלנו</a>
    <div class="note" data-he="משלוח חינם לכל הארץ · שירות אישי וזמין · רכישה מאובטחת" data-en="Free shipping across Israel · Personal service · Secure shopping">משלוח חינם לכל הארץ · שירות אישי וזמין · רכישה מאובטחת</div>
  </section>
</div>

<footer data-he="© Naya Fine Jewelry 2006" data-en="© Naya Fine Jewelry 2006">© Naya Fine Jewelry 2006</footer>

<script>
const menu=document.getElementById('mainMenu');
const toggle=document.getElementById('menuToggle');
const closeBtn=document.getElementById('menuClose');
const backdrop=document.getElementById('menuBackdrop');
const langBtn=document.getElementById('langToggle');
const storageKey='naya_lang_final';

function openMenu(){menu.classList.add('open');backdrop.classList.add('open')}
function closeMenu(){menu.classList.remove('open');backdrop.classList.remove('open')}

toggle.onclick=openMenu;
closeBtn.onclick=closeMenu;
backdrop.onclick=closeMenu;
document.addEventListener('keydown',e=>{if(e.key==='Escape') closeMenu();});

function applyLang(lang){
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'he' ? 'rtl' : 'ltr';
  document.body.dir = lang === 'he' ? 'rtl' : 'ltr';

  document.querySelectorAll('[data-he]').forEach(el=>{
    el.textContent = lang === 'he' ? el.dataset.he : el.dataset.en;
  });

  document.title = lang === 'he'
    ? document.body.dataset.titleHe
    : document.body.dataset.titleEn;

  langBtn.textContent = lang === 'he' ? 'EN' : 'HE';
  localStorage.setItem(storageKey, lang);
}

langBtn.onclick=()=>{
  const current = localStorage.getItem(storageKey) || 'he';
  applyLang(current === 'he' ? 'en' : 'he');
};

applyLang(localStorage.getItem(storageKey) || 'he');
</script>

</body>
</html>
