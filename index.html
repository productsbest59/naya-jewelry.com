<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Naya Fine Jewelry</title>
  <meta name="description" content="Naya Fine Jewelry" />
  <style>
    :root{
      --gold1:#f2b21b;
      --gold2:#c88400;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, sans-serif;
      color:#fff;
      text-align:center;
      overflow-x:hidden;
      background:
        radial-gradient(circle at 12% 46%, rgba(212,160,23,0.16), transparent 18%),
        radial-gradient(circle at 88% 46%, rgba(212,160,23,0.12), transparent 18%),
        linear-gradient(180deg,#2b2b2b 0%,#161616 34%,#050505 68%,#000 100%);
    }

    .container{
      max-width:1320px;
      margin:auto;
      padding-bottom:40px;
    }

    .header{
      height:240px;
      background:url("https://cdn.jsdelivr.net/gh/productsbest59/naya-jewelry.com/header.png") center/cover no-repeat;
      background-color:#111;
    }

    .logo-row{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:14px;
      padding:0 10px;
      margin-top:-28px;
      margin-bottom:20px;
    }

    .logo{
      width:190px;
      display:block;
      background:none !important;
      box-shadow:none !important;
      border:none !important;
      border-radius:0 !important;
      filter:
        drop-shadow(0 12px 30px rgba(0,0,0,0.7))
        drop-shadow(0 0 10px rgba(255,200,0,0.25));
    }

    .btn{
      width:auto;
      min-width:140px;
      padding:12px 14px;
      border-radius:999px;
      text-decoration:none;
      font-weight:700;
      font-size:0.9rem;
      color:#2b1800;
      background:linear-gradient(180deg,var(--gold1),var(--gold2));
      box-shadow:
        0 0 18px rgba(255,170,0,0.30),
        inset 0 0 0 2px rgba(255,245,210,0.44);
    }

    .gallery{
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
      padding:0 12px;
    }

    .box{
      min-height:170px;
      border:2px dashed rgba(255,255,255,0.25);
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#ccc;
      background:rgba(255,255,255,0.02);
      padding:16px;
    }

    @media (min-width:901px){
      .header{
        height:330px;
        background:url("https://cdn.jsdelivr.net/gh/productsbest59/naya-jewelry.com/header%20desktop.png") center/cover no-repeat;
        background-color:#111;
      }

      .logo-row{
        gap:18px;
        margin-top:-42px;
        margin-bottom:24px;
      }

      .logo{
        width:300px;
      }

      .btn{
        min-width:200px;
        padding:14px 22px;
        font-size:1rem;
      }

      .gallery{
        grid-template-columns:repeat(3,1fr);
        gap:18px;
        padding:0 16px;
      }

      .box{
        min-height:220px;
      }
    }
  </style>
</head>
<body>

<div class="container">

  <div class="header"></div>

  <div class="logo-row">
    <a class="btn" href="https://twik.co.il/store/Naya/">לחנות שלנו</a>

    <img
      src="https://cdn.jsdelivr.net/gh/productsbest59/naya-jewelry.com/logo%20trans.png"
      class="logo"
      alt="logo"
    >

    <a class="btn" href="https://twik.co.il/a/Naya/">לאתר שלנו</a>
  </div>

  <div class="gallery">
    <div class="box">כאן תבוא תמונה</div>
    <div class="box">כאן תבוא תמונה</div>
    <div class="box">כאן תבוא תמונה</div>
  </div>

</div>

</body>
</html>
