<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Naya Fine Jewelry</title>

  <style>
    :root{
      --gold1:#f2b21b;
      --gold2:#c88400;
      --text:#ffffff;
      --bg-top:#2d2d2d;
      --bg-bottom:#000000;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      text-align:center;
      background:
        radial-gradient(circle at 15% 40%, rgba(212,160,23,0.25), transparent 20%),
        radial-gradient(circle at 85% 40%, rgba(212,160,23,0.18), transparent 20%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
    }

    .container{
      max-width:900px;
      margin:auto;
    }

    /* ===== HEADER ===== */
    .header-wrap{
      width:100%;
      background:#111;
      overflow:hidden;
    }

    .header-image{
      display:block;
      width:100%;
      height:180px;        /* 👈 מוקטן */
      object-fit:cover;    /* 👈 נראה כמו באנר */
    }

    /* מובייל */
    @media (max-width:700px){
      .header-image{
        height:120px;
      }
    }

    /* ===== LOGO ===== */
    .logo-wrap{
      width:180px;
      height:180px;
      margin:-40px auto 20px;
      border-radius:50%;
      overflow:hidden;
      background:#111;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:
        0 0 30px rgba(255,200,0,0.25),
        0 20px 40px rgba(0,0,0,0.7);
    }

    .logo-wrap img{
      width:100%;
      height:100%;
      object-fit:cover;
      border-radius:50%;
    }

    /* ===== BUTTONS ===== */
    .buttons{
      display:flex;
      justify-content:center;
      gap:15px;
      flex-wrap:wrap;
      margin-bottom:30px;
    }

    .btn{
      padding:14px 26px;
      border-radius:999px;
      text-decoration:none;
      font-weight:bold;
      font-size:1.1rem;
      color:#2b1800;
      background:linear-gradient(180deg, var(--gold1), var(--gold2));
      box-shadow:0 0 20px rgba(255,170,0,0.4);
      transition:0.2s;
    }

    .btn:hover{
      transform:translateY(-2px);
      box-shadow:0 0 25px rgba(255,170,0,0.6);
    }

    /* ===== GALLERY ===== */
    .gallery{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:15px;
      padding:0 15px;
    }

    .placeholder{
      height:180px;
      border:2px dashed rgba(255,255,255,0.25);
      border-radius:15px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#ccc;
    }

    @media (max-width:700px){
      .gallery{
        grid-template-columns:1fr;
      }
    }

  </style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header-wrap">
    <img src="https://cdn.jsdelivr.net/gh/productsbest59/naya-jewelry.com/header.png" class="header-image">
  </div>

  <!-- LOGO -->
  <div class="logo-wrap">
    <img src="https://cdn.jsdelivr.net/gh/productsbest59/naya-jewelry.com/logo.png">
  </div>

  <!-- BUTTONS -->
  <div class="buttons">
    <a class="btn" href="https://twik.co.il/a/Naya/" target="_blank">לאתר שלנו</a>
    <a class="btn" href="https://twik.co.il/store/Naya/" target="_blank">לחנות שלנו</a>
  </div>

  <!-- GALLERY -->
  <div class="gallery">
    <div class="placeholder">כאן תבוא תמונה</div>
    <div class="placeholder">כאן תבוא תמונה</div>
    <div class="placeholder">כאן תבוא תמונה</div>
  </div>

</div>

</body>
</html>
