<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Naya Fine Jewelry</title>

  <style>
    :root{
      --gold1:#f2b21b;
      --gold2:#c88400;
      --text:#ffffff;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      text-align:center;
      background:
        radial-gradient(circle at 15% 40%, rgba(212,160,23,0.2), transparent 20%),
        radial-gradient(circle at 85% 40%, rgba(212,160,23,0.15), transparent 20%),
        linear-gradient(180deg, #2b2b2b, #000);
    }

    .container{
      max-width:1200px;
      margin:auto;
    }

    /* ===== HEADER ===== */
    .header{
      width:100%;
      padding-top:20px;
      background:#111;
    }

    .header img{
      width:90%;
      max-width:1000px;
      display:block;
      margin:auto;
    }

    /* ===== LOGO ===== */
    .logo{
      width:120px;
      margin:-25px auto 15px;
      display:block;
      filter: drop-shadow(0 10px 25px rgba(0,0,0,0.6));
    }

    /* ===== BUTTONS ===== */
    .buttons{
      display:flex;
      justify-content:center;
      gap:15px;
      margin:20px 10px;
    }

    .btn{
      flex:1;
      max-width:200px;
      padding:14px;
      border-radius:999px;
      text-decoration:none;
      font-weight:bold;
      color:#2b1800;
      background:linear-gradient(180deg, var(--gold1), var(--gold2));
      box-shadow:0 0 20px rgba(255,170,0,0.4);
    }

    /* ===== GALLERY ===== */
    .gallery{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:15px;
      padding:15px;
    }

    .box{
      height:180px;
      border:2px dashed rgba(255,255,255,0.3);
      border-radius:15px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#ccc;
    }

    /* ===== MOBILE ===== */
    @media(max-width:700px){

      .header img{
        width:100%;
      }

      .logo{
        width:85px;
        margin:-15px auto 10px;
      }

      .buttons{
        gap:10px;
      }

      .btn{
        font-size:0.9rem;
        padding:12px;
      }

      .gallery{
        grid-template-columns:1fr;
      }
    }

  </style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <img src="https://cdn.jsdelivr.net/gh/productsbest59/naya-jewelry.com/header.png">
  </div>

  <!-- LOGO -->
  <img src="https://cdn.jsdelivr.net/gh/productsbest59/naya-jewelry.com/logo.png" class="logo">

  <!-- BUTTONS -->
  <div class="buttons">
    <a class="btn" href="https://twik.co.il/a/Naya/" target="_blank">לאתר שלנו</a>
    <a class="btn" href="https://twik.co.il/store/Naya/" target="_blank">לחנות שלנו</a>
  </div>

  <!-- GALLERY -->
  <div class="gallery">
    <div class="box">כאן תבוא תמונה</div>
    <div class="box">כאן תבוא תמונה</div>
    <div class="box">כאן תבוא תמונה</div>
  </div>

</div>

</body>
</html>
