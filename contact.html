<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>צור קשר | NAYA</title>
<meta name="description" content="צור קשר עם NAYA – שאלות, שירות לקוחות והזמנות.">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b0b;
  color: #fff;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 50px 20px;
}

h1 {
  text-align: center;
  margin-bottom: 30px;
}

form {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

input, textarea {
  padding: 14px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  background: #1a1a1a;
  color: #fff;
}

input::placeholder,
textarea::placeholder {
  color: #aaa;
}

textarea {
  min-height: 130px;
  resize: vertical;
}

button {
  background: linear-gradient(45deg, #d4af37, #f1d97a);
  border: none;
  padding: 14px;
  font-size: 16px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

button:hover {
  opacity: 0.9;
}

.success {
  display: none;
  text-align: center;
  margin-top: 20px;
  color: #4caf50;
  font-weight: bold;
}

footer {
  text-align: center;
  margin-top: 60px;
  color: #aaa;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

<h1>צור קשר</h1>

<form action="https://formspree.io/f/xjgjqkoj" method="POST">

<input type="text" name="name" placeholder="שם מלא" required>

<input type="email" name="email" placeholder="אימייל" required>

<input type="text" name="subject" placeholder="נושא הפנייה">

<textarea name="message" placeholder="הודעה" required></textarea>

<button type="submit">שלח הודעה</button>

</form>

<div class="success" id="successMsg">
ההודעה נשלחה בהצלחה 🙌
</div>

<footer>
© Naya Fine Jewelry 2006
</footer>

</div>

</body>
</html>
