<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>צור קשר - Naya</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 500px;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 12px;
      border: none;
      background: #1a1a1a;
      color: #fff;
      font-size: 14px;
    }

    textarea {
      min-height: 120px;
      resize: none;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 30px;
      background: linear-gradient(45deg, #ffd700, #ffcc00);
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }

    .success {
      display: none;
      margin-top: 15px;
      color: #4cff4c;
      font-weight: bold;
    }

    footer {
      margin-top: 20px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>צור קשר</h1>

  <form id="contactForm">

    <input type="text" name="name" placeholder="שם מלא" required>

    <input type="email" name="email" placeholder="אימייל" required>

    <input type="text" name="subject" placeholder="נושא הפנייה">

    <textarea name="message" placeholder="הודעה" required></textarea>

    <button type="submit">שלח הודעה</button>

  </form>

  <div class="success" id="successMsg">
    🎉 ההודעה נשלחה בהצלחה!
  </div>

  <footer>
    © Naya Fine Jewelry 2006
  </footer>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const form = document.getElementById("contactForm");
  const success = document.getElementById("successMsg");

  form.addEventListener("submit", async function (e) {
    e.preventDefault();

    const data = new FormData(form);

    const response = await fetch("https://formspree.io/f/xjgjqkoj", {
      method: "POST",
      body: data,
      headers: {
        "Accept": "application/json"
      }
    });

    if (response.ok) {
      form.reset();
      success.style.display = "block";
    } else {
      alert("שגיאה בשליחה, נסה שוב");
    }
  });
});
</script>

</body>
</html>
